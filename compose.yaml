services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 16g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
